description: |
  Since 2024, my AI research focus has been the NIST Center for AI Standards and Innovation (CAISI), which serves as an industry point of contact within the U.S. government for AI testing, evaluations, collaborative research, and standards work related to the security and measurement of advanced AI systems.
  <br><br>
  Responsible for: Supporting CAISI's work on AI evaluation, standards, agent security research, and national security partnerships.
